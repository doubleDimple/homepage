# Cloudflare Pages configuration
# This file is used for local development with wrangler

name = "homepage"
compatibility_date = "2024-01-01"

# KV namespace for storing site configuration
# Create with: wrangler kv:namespace create CONFIG
# Then fill in the id below
[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"  # Replace after creating

[vars]
ADMIN_PASSWORD = "your-secure-password"  # Change this!
